[versions]
agp = "9.1.1"
kotlin = "2.3.20"
coreKtx = "1.18.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.13.0"
navigationCompose = "2.9.7"
composeBom = "2026.03.01"
composeRuntimeLivedata = "1.10.6"
room = "2.8.4"
paging = "3.4.2"
zxing = "4.3.0"
poi = "5.5.1"
commonsCollections4 = "4.5.0"
gson = "2.13.2"
material = "1.13.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
ksp = "2.3.2"
work = "2.11.2"
jsoup = "1.22.1"
robolectric = "4.16.1"
coroutinesTest = "1.10.2"
turbine = "1.2.1"
mockk = "1.14.9"
coreTesting = "2.2.0"
supabase = "3.5.0"
ktor = "3.4.2"
credentials = "1.6.0"
googleid = "1.2.0"

[libraries]
androidx-core-ktx               = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx  = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
